name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main
jobs:
  docker:
    name: Build and deploy Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build --no-cache -t jansenbhodi/mmologs-backend:latest .

      - name: Push to Docker Hub
        run: docker push jansenbhodi/mmologs-backend:latest

      - name: Redeploy on Railway
        run: |
          curl -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_BACKEND_ENV_ID }}\", serviceId: \"${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}\") }"}'
