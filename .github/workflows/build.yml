name: Build and Deploy
on:
  push:
    branches:
      - main
jobs:
  docker:
    name: Build and deploy Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build --no-cache -t jansenbhodi/mmologs-backend:latest .

      - name: Push to Docker Hub
        run: docker push jansenbhodi/mmologs-backend:latest

      - name: Redeploy on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_BACKEND_ENV_ID: ${{ secrets.RAILWAY_BACKEND_ENV_ID }}
          RAILWAY_BACKEND_SERVICE_ID: ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}
        run: |
          curl -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceInstanceRedeploy(environmentId: \"$RAILWAY_BACKEND_ENV_ID\", serviceId: \"$RAILWAY_BACKEND_SERVICE_ID\") }"}'